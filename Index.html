<!DOCTYPE html><html>
<head>
<title>For Rashu Ranjan ❤️</title><style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family: Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:42px;
}

p{
font-size:20px;
max-width:600px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4d6d;
cursor:pointer;
margin-top:20px;
<img src="rashu.jpg" width="250">
width:200px;
border-radius:20px;
margin-top:20px;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style></head><body><h1>❤️ Rashu Ranjan ❤️</h1><p>
Dear Rashu,  
You are the most beautiful part of my life.  
Every moment with you is special.  
I promise to always care for you and make you smile.  
Love from Fahad ❤️
</p><img src="photo.jpg"><button onclick="love()">Click for a Surprise</button>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio><script>

function love(){
alert("Rashu Ranjan, you are my happiness and my forever ❤️ - Fahad");
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,300);

</script></body>
</html>
